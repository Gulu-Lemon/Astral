name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path cards -Force | Out-Null
          pyinstaller --onedir --name Astral --noconfirm `
            --add-data "static;static" `
            --add-data "scenarios;scenarios" `
            --add-data "blueprints;blueprints" `
            --add-data "cards;cards" `
            --add-data "NPC_cards;NPC_cards" `
            --hidden-import scenarios.tianji_maze `
            --hidden-import scenarios.cloud_holiday `
            --hidden-import scenarios.snow_train `
            --collect-all flask `
            --collect-all httpx `
            server.py

      - name: Build with PyInstaller (macOS)
        if: matrix.name == 'macos'
        run: |
          mkdir -p cards
          pyinstaller --onedir --windowed --name Astral --noconfirm \
            --add-data "static:static" \
            --add-data "scenarios:scenarios" \
            --add-data "blueprints:blueprints" \
            --add-data "cards:cards" \
            --add-data "NPC_cards:NPC_cards" \
            --hidden-import scenarios.tianji_maze \
            --hidden-import scenarios.cloud_holiday \
            --hidden-import scenarios.snow_train \
            --collect-all flask \
            --collect-all httpx \
            server.py

      - name: Package (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $name = "Astral-windows-${{ github.ref_name }}"
          Compress-Archive -Path dist\Astral\* -DestinationPath $name.zip
          echo "asset=$name.zip" >> $env:GITHUB_ENV

      - name: Package (macOS)
        if: matrix.name == 'macos'
        run: |
          name="Astral-macos-${{ github.ref_name }}"
          hdiutil create -volname Astral -srcfolder dist/Astral.app -ov -format UDZO "${name}.dmg"
          echo "asset=${name}.dmg" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ github.ref_name }}
          path: ${{ env.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
