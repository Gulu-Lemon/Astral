name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path cards -Force | Out-Null
          pyinstaller --onedir --name Astral --noconfirm `
            --add-data "static;static" `
            --add-data "scenarios;scenarios" `
            --add-data "blueprints;blueprints" `
            --add-data "cards;cards" `
            --add-data "NPC_cards;NPC_cards" `
            --hidden-import scenarios.tianji_maze `
            --hidden-import scenarios.cloud_holiday `
            --hidden-import scenarios.snow_train `
            --collect-all flask `
            --collect-all httpx `
            server.py

      - name: Build with PyInstaller (macOS)
        if: matrix.name == 'macos'
        run: |
          mkdir -p cards
          pyinstaller --onedir --windowed --name Astral --noconfirm \
            --add-data "static:static" \
            --add-data "scenarios:scenarios" \
            --add-data "blueprints:blueprints" \
            --add-data "cards:cards" \
            --add-data "NPC_cards:NPC_cards" \
            --hidden-import scenarios.tianji_maze \
            --hidden-import scenarios.cloud_holiday \
            --hidden-import scenarios.snow_train \
            --collect-all flask \
            --collect-all httpx \
            server.py

      - name: Package (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\Astral\* -DestinationPath "Astral-windows-${{ github.ref_name }}.zip"
          echo "asset=Astral-windows-${{ github.ref_name }}.zip" >> $env:GITHUB_ENV

      - name: Package (macOS)
        if: matrix.name == 'macos'
        run: |
          hdiutil create -volname Astral -srcfolder dist/Astral.app -ov -format UDZO "Astral-macos-${{ github.ref_name }}.dmg"
          echo "asset=Astral-macos-${{ github.ref_name }}.dmg" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ github.ref_name }}
          path: ${{ env.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Delete existing releases for this tag
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release and upload assets
        run: |
          gh release create "${{ github.ref_name }}" \
            packages/* \
            --title "${{ github.ref_name }}" \
            --prerelease \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
